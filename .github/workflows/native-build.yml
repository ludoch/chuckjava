name: Native Build

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Native CLI + IDE bundle, per platform
  # ─────────────────────────────────────────────────────────────────────────────
  native:
    name: Native build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            native-exe: chuck
            jpackage-type: app-image
            bundle-path: target/chuck-ide-bundle/chuck-ide
          - os: macos-latest
            platform: mac
            native-exe: chuck
            jpackage-type: dmg
            bundle-path: target/chuck-ide-bundle/chuck-ide-1.0.0.dmg
          - os: windows-latest
            platform: windows
            native-exe: chuck.exe
            jpackage-type: app-image
            bundle-path: target/chuck-ide-bundle/chuck-ide

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 (GraalVM)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: maven
          server-id: github

      # ── Native CLI ────────────────────────────────────────────────────────
      - name: Build native CLI
        run: mvn -Pnative package -DskipTests -B
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run native tests (108 tests)
        run: mvn -Pnative -DskipNativeTests=false test -B
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload native CLI
        uses: actions/upload-artifact@v4
        with:
          name: chuck-${{ matrix.platform }}
          path: target/${{ matrix.native-exe }}
          if-no-files-found: error

      # ── IDE bundle ────────────────────────────────────────────────────────
      # macOS: code-signing is skipped; users may need to allow the app in
      # System Preferences > Security & Privacy on first launch.
      - name: Build IDE bundle
        # skipAot=true: AOT training run launches the app (GUI), not suitable for headless CI.
        # The bundle still works; users can regenerate the cache locally after install.
        run: mvn -Pide-bundle package -DskipTests -B "-Djpackage.type=${{ matrix.jpackage-type }}" -DskipAot=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload IDE bundle
        uses: actions/upload-artifact@v4
        with:
          name: chuck-ide-${{ matrix.platform }}
          path: ${{ matrix.bundle-path }}
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Combine artifacts into a GitHub Release (only on release events)
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish release
    if: github.event_name == 'release'
    needs: native
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f | sort

      # IDE bundles for Linux and Windows are app-image directories — zip them up
      - name: Zip Linux IDE bundle
        run: cd dist/chuck-ide-linux && zip -r ../../chuck-ide-linux.zip chuck-ide/

      - name: Zip Windows IDE bundle
        run: cd dist/chuck-ide-windows && zip -r ../../chuck-ide-windows.zip chuck-ide/

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/chuck-linux/chuck
            dist/chuck-mac/chuck
            dist/chuck-windows/chuck.exe
            chuck-ide-linux.zip
            chuck-ide-windows.zip
            dist/chuck-ide-mac/chuck-ide-1.0.0.dmg
