name: Unit Tests

on:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JVM unit tests (fast, no GraalVM needed)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: JVM tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 (GraalVM)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: maven
          server-id: github

      - name: Run JVM tests (130 tests)
        run: mvn test -B
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
