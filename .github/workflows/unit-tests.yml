name: Unit Tests

on:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JVM unit tests (fast, no GraalVM needed)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: JVM tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          cache: maven

      - name: Run JVM tests (130 tests)
        run: mvn test -B
